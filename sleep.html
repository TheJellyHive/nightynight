<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Sleep - Bedtime Quest</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="theme-color" content="#0c1230">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Bedtime Quest">
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: radial-gradient(ellipse at top, #1b2650 0%, #0c1230 55%, #06081c 100%);
    color: #eef0ff; display: flex; justify-content: center; padding: 28px 16px 64px; overflow-x: hidden;
  }
  .stars {
    position: fixed; inset: 0;
    background-image:
      radial-gradient(2px 2px at 20px 30px, #ffffff88, transparent),
      radial-gradient(2px 2px at 140px 80px, #ffffff66, transparent),
      radial-gradient(1.5px 1.5px at 90px 160px, #ffffffaa, transparent),
      radial-gradient(2px 2px at 220px 40px, #ffffff77, transparent),
      radial-gradient(1.5px 1.5px at 300px 120px, #ffffff99, transparent),
      radial-gradient(2px 2px at 60px 220px, #ffffff55, transparent),
      radial-gradient(1.5px 1.5px at 260px 200px, #ffffff88, transparent);
    background-repeat: repeat; background-size: 340px 260px;
    animation: twinkle 4s ease-in-out infinite alternate; pointer-events: none; z-index: 0;
  }
  @keyframes twinkle { from { opacity: .5; } to { opacity: 1; } }
  nav.topnav { display: flex; gap: 8px; margin-bottom: 18px; position: relative; z-index: 1; }
  nav.topnav a {
    flex: 1; text-align: center; padding: 8px; border-radius: 10px; font-size: 12px;
    text-decoration: none; color: #a7aede; border: 1px solid #ffffff1a; background: #ffffff0a;
  }
  nav.topnav a.active { color: #ffe9b8; border-color: #ffd88a55; background: #ffd88a1a; }
  main { position: relative; z-index: 1; width: 100%; max-width: 460px; text-align: center; }
  h1 { font-size: 22px; font-weight: 600; margin: 4px 0 2px; color: #ffe9b8; }
  h2 { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #a7aede; margin: 0 0 10px; text-align: left; }
  .sub { color: #a7aede; font-size: 13px; margin: 0 0 18px; }
  .panel { background: #ffffff0d; border: 1px solid #ffffff22; border-radius: 16px; padding: 16px; margin-bottom: 16px; text-align: left; }
  button.big {
    width: 100%; padding: 14px; border-radius: 12px; border: none;
    font-size: 15px; font-weight: 600; cursor: pointer; margin-bottom: 8px;
    transition: transform .15s ease, opacity .2s ease;
  }
  button.big:active { transform: scale(0.98); }
  #goodnightBtn { background: linear-gradient(90deg,#7f77dd,#ff9ecf); color: #1b1230; }
  #goodmorningBtn { background: linear-gradient(90deg,#ffd88a,#ffb37a); color: #402d05; }
  button:disabled { opacity: .45; cursor: default; }
  .feedback { font-size: 13px; min-height: 18px; margin: 0 0 16px; color: #dfe3ff; text-align: left; }
  .divider { height: 1px; background: #ffffff22; margin: 20px 0 16px; }
  .manual-row { display: flex; gap: 8px; align-items: center; margin-top: 6px; }
  .manual-row input[type=date], .manual-row input[type=number] {
    background: #ffffff0d; border: 1px solid #ffffff22; color: #eef0ff; border-radius: 8px; padding: 8px; font-size: 13px;
  }
  .manual-row input[type=number] { width: 70px; }
  .manual-row button {
    padding: 8px 12px; border-radius: 8px; border: 1px solid #ffffff22; background: #ffffff0d; color: #eef0ff; cursor: pointer; font-size: 13px;
  }
  .stat-grid { display: flex; gap: 10px; margin-bottom: 14px; }
  .stat-card { flex: 1; background: #ffffff0d; border-radius: 12px; padding: 10px; text-align: center; }
  .stat-card .num { font-size: 20px; font-weight: 600; }
  .stat-card .lbl { font-size: 11px; color: #a7aede; margin-top: 2px; }
  .sleep-chart {
    display: flex; align-items: flex-end; gap: 3px; height: 120px; margin: 10px 0 6px;
    overflow-x: auto; padding-bottom: 2px;
  }
  .sleep-bar { width: 10px; border-radius: 3px 3px 0 0; flex-shrink: 0; min-height: 3px; }
  .sleep-bar.empty { background: #ffffff14 !important; }
  .legend { display: flex; gap: 12px; font-size: 11px; color: #a7aede; flex-wrap: wrap; }
  .legend span { display: inline-flex; align-items: center; gap: 4px; }
  .swatch { width: 10px; height: 10px; border-radius: 3px; display: inline-block; }
</style>
</head>
<body>
<div class="stars"></div>
<main>
  <nav class="topnav">
    <a href="index.html">Tonight</a>
    <a href="morning.html">Morning</a>
    <a href="sleep.html" class="active">Sleep</a>
  </nav>
  <h1>Sleep tracker</h1>
  <p class="sub">Log it with a tap or type the hours directly. Colors show how the night actually went.</p>

  <button class="big" id="goodnightBtn">Goodnight</button>
  <button class="big" id="goodmorningBtn">Good morning</button>
  <p class="feedback" id="sleepFeedback"></p>

  <div class="divider"></div>

  <h2>Manual entry</h2>
  <div class="manual-row">
    <input type="date" id="manualDate">
    <input type="number" id="manualHours" step="0.25" min="0" max="16" placeholder="hrs">
    <button id="manualLogBtn">Log</button>
  </div>

  <div class="divider"></div>

  <div class="stat-grid">
    <div class="stat-card"><div class="num" id="avg7">-</div><div class="lbl">7-day avg</div></div>
    <div class="stat-card"><div class="num" id="avg30">-</div><div class="lbl">30-day avg</div></div>
    <div class="stat-card"><div class="num" id="nightsLogged">0</div><div class="lbl">nights logged</div></div>
  </div>

  <div class="panel">
    <h2>Last 30 nights</h2>
    <div class="sleep-chart" id="sleepChart"></div>
    <div class="legend">
      <span><span class="swatch" style="background:rgb(226,75,74)"></span>0-4h bad</span>
      <span><span class="swatch" style="background:rgb(255,216,138)"></span>5-6h / 10h+ okay</span>
      <span><span class="swatch" style="background:rgb(79,214,160)"></span>7-9h good</span>
    </div>
  </div>
</main>
<script src="shared.js"></script>
<script src="sleep.js"></script>
</body>
</html>
